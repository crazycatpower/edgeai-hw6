name: Deploy

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  # ── Job 1: Re-tag the SHA image as semver on GHCR (cloud runner) ─────────
  re-tag:
    name: Re-tag image as semver
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.full }}
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          MAJOR=${TAG%%.*}
          MINOR=${TAG%.*}
          echo "full=${TAG}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MINOR}" >> $GITHUB_OUTPUT
          SHA_TAG=$(git rev-parse --short HEAD)
          echo "sha=sha-${SHA_TAG}" >> $GITHUB_OUTPUT

      - name: Re-tag image as semver (no rebuild)
        run: |
          SRC="ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.sha }}"
          for TAG in \
            "${{ steps.tag.outputs.full }}" \
            "${{ steps.tag.outputs.minor }}" \
            "${{ steps.tag.outputs.major }}" \
            "latest"; do
            docker buildx imagetools create \
              --tag "ghcr.io/${{ github.repository }}:${TAG}" \
              "${SRC}"
          done

  # ── Job 2: Deploy to Jetson via self-hosted runner (no SSH needed) ────────
  deploy:
    name: Deploy (Jetson)
    runs-on: [self-hosted, linux, arm64, jetson]
    needs: re-tag
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR on Jetson
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull tagged image
        run: docker pull ghcr.io/${{ github.repository }}:${{ needs.re-tag.outputs.tag }}

      - name: Run deploy.sh on Jetson
        env:
          IMAGE_TAG: ${{ needs.re-tag.outputs.tag }}
          DEPLOY_ENV: production
        run: |
          chmod +x deploy/deploy.sh deploy/healthcheck.sh deploy/rollback.sh
          bash deploy/deploy.sh
