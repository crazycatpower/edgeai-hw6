name: Deploy

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          MAJOR=${TAG%%.*}
          MINOR=${TAG%.*}
          echo "full=${TAG}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MINOR}" >> $GITHUB_OUTPUT
          SHA_TAG=$(git rev-parse --short HEAD)
          echo "sha=sha-${SHA_TAG}" >> $GITHUB_OUTPUT

      - name: Re-tag image (no rebuild)
        run: |
          SRC="ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.sha }}"
          for TAG in \
            "${{ steps.tag.outputs.full }}" \
            "${{ steps.tag.outputs.minor }}" \
            "${{ steps.tag.outputs.major }}" \
            "latest"; do
            docker buildx imagetools create \
              --tag "ghcr.io/${{ github.repository }}:${TAG}" \
              "${SRC}"
          done

      - name: Deploy to Jetson
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.JETSON_HOST }}
          username: ${{ secrets.JETSON_USER }}
          key: ${{ secrets.JETSON_SSH_KEY }}
          envs: FULL_TAG
          script: |
            export IMAGE_TAG=${{ steps.tag.outputs.full }}
            cd ~/edgeai-hw6
            git pull origin main
            bash deploy/deploy.sh
        env:
          FULL_TAG: ${{ steps.tag.outputs.full }}
