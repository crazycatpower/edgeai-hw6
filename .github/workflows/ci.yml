name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install ruff
      - run: ruff format --check .
      - run: ruff check .

  test:
    name: Pytest + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -r requirements.txt
      - run: |
          pytest tests/ \
            --ignore=tests/integration \
            --cov=src \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -v
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

  security-scan:
    name: Bandit + pip-audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install bandit pip-audit
      - name: Bandit (Python SAST)
        run: bandit -r src/ -ll -c pyproject.toml
      - name: pip-audit (CVE scan on deps)
        run: pip-audit --strict -r requirements.txt

  build:
    name: Build & push ARM64 image
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  integration-test:
    name: Integration test (Jetson)
    runs-on: [self-hosted, linux, arm64, jetson]
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      REGISTRY: ghcr.io
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install pytest deps (cached on the Jetson)
        run: pip3 install pytest paho-mqtt pytest-timeout
      - name: Pre-pull image (outside pytest timeout)
        run: |
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          docker pull ghcr.io/${{ github.repository }}:sha-${SHA}
      - name: Diagnose environment before test
        run: |
          echo "=== docker ps ==="
          docker ps -a
          echo "=== port 8000 usage ==="
          ss -tlnp sport = :8000 || true
          echo "=== remove stale test container ==="
          docker rm -f ci-edgeai-test || true
      - name: Run integration test
        run: python3 -m pytest tests/integration/ -v --timeout=120
